
<!DOCTYPE html>
<html>
<head>
<title>Plan My Trip</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="form">
<h1>Get Your Custom Trip Plan</h1>

<form action="https://formsubmit.co/globetrottertripsgroup@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_autoresponse" value="Thanks for contacting Globetrotter Trips! We will begin planning your vacation shortly.">

<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Phone</label>
<input type="text" name="phone">

<label>Destination</label>
<input type="text" name="destination">

<label>Trip Type</label>
<input type="text" name="tripType">

<label>Message</label>
<textarea name="message"></textarea>

<button type="submit">Start Planning</button>

</form>
</div>

</body>
</html>
